<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日野市 ごみ出しナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #ECE7DC;
    --paper-deep: #E1DACB;
    --card: #F7F4EC;
    --ink: #24272B;
    --ink-soft: #5B5A53;
    --line: #C9C0AC;
    --ai: #2C4A6E;       /* 藍色 indigo — primary accent */
    --ai-deep: #1C324B;
    --hanko: #B23A2E;    /* 朱色 hanko stamp red — signature accent, used sparingly */

    --c-moeru: #C0533B;
    --c-fumoeru: #5B7083;
    --c-plastic: #3E8E7E;
    --c-yugai: #B8860B;
    --c-kk: #6B5B7B;
    --c-furugi: #B5788A;
    --c-shigen: #6B8E4E;
    --c-sodai: #7A7264;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 26px),
      var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    padding:28px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px;margin:0 auto;}

  /* ---- Letterhead ---- */
  .letterhead{
    display:flex; align-items:flex-start; justify-content:space-between;
    border-bottom:3px solid var(--ink);
    padding-bottom:14px; margin-bottom:22px;
    gap:12px;
  }
  .letterhead h1{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:26px;
    letter-spacing:.04em;
    margin:0 0 4px;
    color:var(--ink);
  }
  .letterhead .sub{
    font-size:12px; color:var(--ink-soft); letter-spacing:.03em;
  }
  .stamp{
    flex:none;
    width:64px;height:64px;border-radius:50%;
    border:2.5px solid var(--hanko);
    color:var(--hanko);
    display:flex;align-items:center;justify-content:center;
    font-family:'Shippori Mincho', serif;
    font-weight:800; font-size:13px; line-height:1.15; text-align:center;
    transform:rotate(-8deg);
    opacity:.92;
    writing-mode:vertical-rl;
    padding:4px 0;
  }

  /* ---- Search ---- */
  .search-block{position:relative; margin-bottom:8px;}
  .search-label{
    font-size:11px; color:var(--ink-soft); letter-spacing:.08em;
    margin-bottom:6px; display:block; font-weight:700;
  }
  .search-box{
    display:flex; align-items:center; gap:10px;
    background:var(--card);
    border:1.5px solid var(--ink);
    padding:12px 14px;
    box-shadow:3px 3px 0 var(--line);
  }
  .search-box input{
    flex:1; border:none; background:none; outline:none;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:17px; color:var(--ink); font-weight:500;
  }
  .search-box input::placeholder{color:#A79E8C;}
  .search-idx{
    font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--ink-soft);
    border:1px solid var(--line); border-radius:3px; padding:2px 6px; flex:none;
  }
  .suggest{
    position:absolute; left:0; right:0; top:100%; margin-top:6px;
    background:var(--card); border:1.5px solid var(--ink);
    box-shadow:3px 3px 0 var(--line);
    max-height:260px; overflow-y:auto; z-index:20;
    display:none;
  }
  .suggest.open{display:block;}
  .suggest button{
    display:flex; width:100%; align-items:center; gap:10px;
    text-align:left; background:none; border:none; cursor:pointer;
    padding:10px 14px; font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:14.5px; color:var(--ink);
    border-bottom:1px solid rgba(0,0,0,0.06);
  }
  .suggest button:last-child{border-bottom:none;}
  .suggest button:hover{background:var(--paper-deep);}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .suggest .catname{margin-left:auto; font-size:11px; color:var(--ink-soft);}

  .hint{font-size:12px; color:var(--ink-soft); margin:8px 2px 26px;}

  /* ---- Result card ---- */
  .result{
    display:none;
    background:var(--card);
    border:1.5px solid var(--ink);
    padding:22px 22px 20px;
    margin-bottom:28px;
    position:relative;
    box-shadow:4px 4px 0 var(--line);
  }
  .result.show{display:block; animation: stamp-in .28s cubic-bezier(.2,1.4,.4,1);}
  @keyframes stamp-in{
    0%{transform:scale(1.18) rotate(-3deg); opacity:0;}
    60%{transform:scale(.98) rotate(.5deg); opacity:1;}
    100%{transform:scale(1) rotate(0); opacity:1;}
  }
  .result .item-name{font-size:13px; color:var(--ink-soft); margin-bottom:10px;}
  .result .item-name b{color:var(--ink); font-weight:700;}
  .cat-tag{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Shippori Mincho', serif; font-weight:700;
    font-size:19px; color:#fff; padding:6px 16px;
    margin-bottom:16px;
  }
  .next-date{
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    border-top:1px dashed var(--line); border-bottom:1px dashed var(--line);
    padding:14px 0; margin-bottom:14px;
  }
  .next-date .label{font-size:12px; color:var(--ink-soft); font-weight:700;}
  .next-date .big{
    font-family:'JetBrains Mono', monospace; font-weight:700;
    font-size:30px; color:var(--ai-deep);
  }
  .next-date .wd{font-size:14px; color:var(--ink-soft);}
  .next-date .rel{
    font-size:12px; color:#fff; background:var(--hanko);
    padding:2px 9px; border-radius:2px; font-weight:700;
  }
  .special-box{
    border:1px dashed var(--hanko); background:rgba(178,58,46,0.06);
    padding:12px 14px; margin-bottom:14px; font-size:13.5px; line-height:1.7;
  }
  .special-box b{color:var(--hanko);}
  .putout{font-size:13.5px; line-height:1.85; color:var(--ink);}
  .putout .ph{font-size:11px; font-weight:700; color:var(--ink-soft); letter-spacing:.06em; margin-bottom:5px;}
  .putout ul{margin:0; padding-left:1.2em;}
  .note-line{font-size:12.5px; color:var(--ink-soft); margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .empty-note{
    display:none; font-size:13.5px; line-height:1.8; color:var(--ink-soft);
    background:var(--card); border:1.5px dashed var(--line); padding:16px 18px; margin-bottom:28px;
  }
  .empty-note.show{display:block;}
  .empty-note a{color:var(--ai); font-weight:700;}

  /* ---- Calendar strip ---- */
  .section-title{
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:15px;
    margin:0 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .section-title span.small{font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; color:var(--ink-soft); font-weight:500;}
  .strip{
    display:flex; overflow-x:auto; gap:8px; padding-bottom:10px; margin-bottom:30px;
    scrollbar-width:thin;
  }
  .day-ticket{
    flex:none; width:84px;
    background:var(--card); border:1px solid var(--line);
    padding:9px 8px 10px; text-align:center;
  }
  .day-ticket.today{border:1.5px solid var(--ai); box-shadow:2px 2px 0 var(--ai);}
  .day-ticket.holi{background:#F3E8E4;}
  .day-ticket .dnum{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:19px;}
  .day-ticket .dwd{font-size:10.5px; color:var(--ink-soft); margin-bottom:6px;}
  .day-ticket .dnote{font-size:8.5px; color:var(--hanko); min-height:11px; margin-bottom:3px;}
  .day-ticket .chips{display:flex; flex-wrap:wrap; gap:3px; justify-content:center;}
  .chip{
    font-size:8.5px; color:#fff; padding:2px 5px; border-radius:2px; line-height:1.3;
    white-space:nowrap;
  }
  .day-ticket.today .dnum{color:var(--ai-deep);}

  /* ---- Legend ---- */
  .legend{display:flex; flex-wrap:wrap; gap:8px 16px; margin-bottom:32px;}
  .legend .li{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}

  footer{
    font-size:11.5px; color:var(--ink-soft); border-top:1px solid var(--line);
    padding-top:14px; line-height:1.8;
  }
  footer a{color:var(--ai);}
</style>
</head>
<body>
<div class="wrap">

  <div class="letterhead">
    <div>
      <h1>日野市 ごみ出しナビ</h1>
      <div class="sub">品目検索 &amp; 収集日カレンダー ｜ 対応期間 2026年5月〜12月</div>
    </div>
    <div class="stamp">日野市</div>
  </div>

  <div class="search-block">
    <label class="search-label">品目を検索</label>
    <div class="search-box">
      <input id="q" type="text" placeholder="例：乾電池、ペットボトル、蛍光灯..." autocomplete="off">
      <span class="search-idx" id="idxCount">824件</span>
    </div>
    <div class="suggest" id="suggest"></div>
  </div>
  <div class="hint">品目名の一部を入力すると候補が出ます。データにない品目は無理に判定しません。</div>

  <div class="result" id="result"></div>
  <div class="empty-note" id="emptyNote"></div>

  <div class="section-title">今後2週間の収集カレンダー <span class="small">今日：<span id="todayLabel"></span></span></div>
  <div class="strip" id="strip"></div>

  <div class="legend" id="legend"></div>

  <footer>
    データ出典：東京都オープンデータ「日野市家庭ごみ分別辞典」／日野市公式サイト（ごみ出し基本ルール）。判定に迷う品目は
    <a href="https://www.gomisaku.jp/0020/" target="_blank" rel="noopener">日野市ごみ分別辞典</a> でご確認ください。
    粗大ごみのお申込みは日野環境保全（042-581-4331）、クリーンセンターは042-581-0444。
  </footer>
</div>

/* ---------- 日付ユーティリティ ---------- */
function todayISO(){
  const d = new Date();
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const WEEKDAY_JA = ['日','月','火','水','木','金','土'];

function findNextForGroup(group, fromISO){
  for(const row of SCHEDULE){
    const [dateStr,,,itemsStr] = row;
    if(dateStr < fromISO) continue;
    const tokens = itemsStr.split('／').map(s=>s.trim()).filter(Boolean);
    for(const t of tokens){
      if(SCHED_TOKEN_TO_GROUP[t] === group) return row;
    }
  }
  return null;
}

function daysBetween(aISO,bISO){
  const a=new Date(aISO+'T00:00:00'), b=new Date(bISO+'T00:00:00');
  return Math.round((b-a)/86400000);
}

const CATEGORY_ALIASES = {
  "雑誌":"雑誌・雑紙類", "雑紙":"雑誌・雑紙類", "本":"雑誌・雑紙類", "書籍":"雑誌・雑紙類",
  "缶":"かん", "瓶":"びん", "ビン":"びん",
  "新聞紙":"新聞", "古新聞":"新聞",
  "プラゴミ":"プラスチック類ごみ", "プラごみ":"プラスチック類ごみ", "プラ":"プラスチック類ごみ",
  "粗大":"粗大ごみ", "剪定":"剪定枝（戸別収集）", "枝":"剪定枝（戸別収集）",
  "ダンボール":"段ボール", "だんぼーる":"段ボール"
};
function findAliasMatches(v){
  const seen = new Set(); const out = [];
  for(const key in CATEGORY_ALIASES){
    if(key.includes(v) || v.includes(key)){
      const cat = CATEGORY_ALIASES[key];
      if(seen.has(cat)) continue;
      seen.add(cat);
      out.push([key, cat, '', `「${key}」で検索された方向けの分類ショートカットです。個別の品目名でも検索できます。`]);
    }
  }
  return out;
}

let currentMatches = [];

qEl.addEventListener('input', ()=>{
  const v = qEl.value.trim();
  if(!v){ suggestEl.classList.remove('open'); suggestEl.innerHTML=''; currentMatches=[]; return; }
  // 1st: 品目名に含まれるもの／2nd: カテゴリの一般名称エイリアス／3rd: 注意点・備考
  const nameMatches = ITEMS.filter(i => i[0].includes(v));
  const aliasMatches = findAliasMatches(v);
  const noteMatches = ITEMS.filter(i => !nameMatches.includes(i) && ((i[2]&&i[2].includes(v)) || (i[3]&&i[3].includes(v))));
  currentMatches = nameMatches.concat(aliasMatches, noteMatches).slice(0,8);
  if(currentMatches.length===0){
    suggestEl.innerHTML = '<button disabled style="color:#A79E8C;cursor:default;">該当する品目が見つかりません（表記ゆれの可能性があります）</button>';
    suggestEl.classList.add('open');
    return;
  }
  suggestEl.innerHTML = currentMatches.map((m,idx)=>{
    const grp = ITEM_CAT_TO_GROUP[m[1]] || 'shigai';
    const isAlias = aliasMatches.includes(m);
    const viaNote = !isAlias && !m[0].includes(v);
    const tag = isAlias ? '<span class="catname" style="color:var(--ai)">分類ショートカット</span>' : (viaNote ? '<span class="catname" style="color:var(--hanko)">備考に一致</span>' : '');
    return `<button data-idx="${idx}"><span class="dot" style="background:${GROUP_COLOR[grp]}"></span>${escapeHtml(m[0])}${tag}<span class="catname">${escapeHtml(m[1])}</span></button>`;
  }).join('');
  suggestEl.classList.add('open');
});
suggestEl.addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-idx]');
  if(!btn) return;
  const item = currentMatches[Number(btn.dataset.idx)];
  if(!item) return;
  qEl.value = item[0];
  suggestEl.classList.remove('open');
  showResult(item);
});
document.addEventListener('click',(e)=>{
  if(!e.target.closest('.search-block')) suggestEl.classList.remove('open');
});

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showResult(item){
  const [name, catRaw, memo, remark] = item;
  const group = ITEM_CAT_TO_GROUP[catRaw];
  const resultEl = document.getElementById('result');
  const emptyEl = document.getElementById('emptyNote');
  emptyEl.classList.remove('show');
  resultEl.classList.remove('show');

  const color = GROUP_COLOR[group] || '#8a8a8a';
  let html = `<div class="item-name">検索品目：<b>${escapeHtml(name)}</b></div>`;
  html += `<div class="cat-tag" style="background:${color}">${escapeHtml(catRaw)}</div>`;

  if(group === 'sodai' || group === 'kaden4' || group === 'shigai'){
    html += `<div class="special-box"><b>この品目は通常の収集スケジュールに載っていません。</b><br>${PUTOUT_TIPS[group].join('<br>')}</div>`;
  } else if(group === 'sentei'){
    html += `<div class="special-box"><b>個別収集日はカレンダーに載っていません。</b><br>${PUTOUT_TIPS.sentei.join('<br>')}</div>`;
  } else if(group === 'omutsu'){
    html += `<div class="special-box">${PUTOUT_TIPS.omutsu.join('<br>')}</div>`;
  } else {
    const today = todayISO();
    const next = findNextForGroup(group, today);
    if(next){
      const [dateStr,,noteStr] = next;
      const d = new Date(dateStr+'T00:00:00');
      const wd = WEEKDAY_JA[d.getDay()];
      const diff = daysBetween(today, dateStr);
      const relLabel = diff===0 ? '今日' : diff===1 ? '明日' : `${diff}日後`;
      html += `<div class="next-date">
        <span class="label">次回収集日</span>
        <span class="big">${d.getMonth()+1}/${d.getDate()}</span>
        <span class="wd">（${wd}）${noteStr ? '・'+escapeHtml(noteStr) : ''}</span>
        <span class="rel">${relLabel}</span>
      </div>`;
    } else {
      html += `<div class="special-box">今後のスケジュール内に該当する収集日が見つかりませんでした（データ範囲：2026年5月〜12月）。</div>`;
    }
    html += `<div class="putout"><div class="ph">出し方</div><ul>${PUTOUT_TIPS[group].map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }

  if(memo || remark){
    html += `<div class="note-line">${[memo,remark].filter(Boolean).map(escapeHtml).join(' ／ ')}</div>`;
  }

  resultEl.innerHTML = html;
  resultEl.classList.add('show');
}

/* ---------- カレンダーストリップ ---------- */
function renderStrip(){
  const today = todayISO();
  const upcoming = SCHEDULE.filter(r => r[0] >= today).slice(0,14);
  const strip = document.getElementById('strip');
  document.getElementById('todayLabel').textContent = today.replace(/-/g,'/');

  strip.innerHTML = upcoming.map(row=>{
    const [dateStr, wd, note, itemsStr] = row;
    const d = new Date(dateStr+'T00:00:00');
    const isToday = dateStr === today;
    const isHoli = !!note;
    const tokens = itemsStr.split('／').map(s=>s.trim()).filter(Boolean);
    const chips = tokens.map(t=>{
      const g = SCHED_TOKEN_TO_GROUP[t] || 'shigai';
      return `<span class="chip" style="background:${GROUP_COLOR[g]}">${escapeHtml(t)}</span>`;
    }).join('');
    return `<div class="day-ticket ${isToday?'today':''} ${isHoli?'holi':''}">
      <div class="dnote">${escapeHtml(note||'')}</div>
      <div class="dnum">${d.getDate()}</div>
      <div class="dwd">${d.getMonth()+1}月・${wd}</div>
      <div class="chips">${chips || '<span class="chip" style="background:#c9c0ac">―</span>'}</div>
    </div>`;
  }).join('');
}

/* ---------- 凡例 ---------- */
function renderLegend(){
  const groups = ['moeru','fumoeru','plastic','yugai','kk','furugi','bin','sodai'];
  document.getElementById('legend').innerHTML = groups.map(g=>
    `<div class="li"><span class="dot" style="background:${GROUP_COLOR[g]}"></span>${GROUP_LABEL[g]}</div>`
  ).join('');
}

renderStrip();
renderLegend();
</script>
